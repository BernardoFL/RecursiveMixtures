# Create with: conda env create -f environment.yml
# Activate with: conda activate recursivemixtures
name: recursivemixtures
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - jax>=0.4.20
    - jaxlib>=0.4.20
    - POT>=0.9.0
    - numpy>=1.24.0
    - matplotlib>=3.7.0
    - scipy>=1.11.0
    - numpyro>=0.13.0
